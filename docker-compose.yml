version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: whot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-whot_game}
      MYSQL_USER: ${DB_USER:-whot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-whot123}
      MYSQL_INITIALIZTION_FILES: /docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    networks:
      - whot-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - whot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: whot-app
    environment:
      NODE_ENV: production
      PORT: 5000
      SOCKET_PORT: 5001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-whot_game}
      DB_USER: ${DB_USER:-whot}
      DB_PASSWORD: ${DB_PASSWORD:-whot123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_change_in_production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      PLATFORM_FEE_PERCENTAGE: ${PLATFORM_FEE_PERCENTAGE:-20}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - whot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: whot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - whot-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  whot-network:
    driver: bridge